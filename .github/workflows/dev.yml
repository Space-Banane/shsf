name: DEV Build Test
run-name: Build Test Workflow
on:
 pull_request:
  branches:
   - dev
 push:
  branches:
   - dev
  paths:
   - "Backend/**"
   - "UI/**"
   - "docker-compose.yml"

permissions:
  contents: write

jobs:
 changes:
  runs-on: ubuntu-latest
  outputs:
   compose: ${{ steps.filter.outputs.compose }}
  steps:
   - uses: actions/checkout@v4
   - uses: dorny/paths-filter@v3
     id: filter
     with:
      filters: |
       compose:
        - 'docker-compose.yml'

 compose_validation:
  needs: changes
  if: needs.changes.outputs.compose == 'true'
  name: Validate Docker Compose
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Install Docker Compose
     run: |
      sudo apt-get update
      sudo apt-get install docker-compose
   - name: Setup environment variables (for validation)
     run: echo "UI_PORT=4000" > .env && echo "PORT=3000" >> .env
   - name: Validate Docker Compose files
     run: docker-compose config

 build_backend:
  name: Build Backend
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Setup Node.js
     uses: actions/setup-node@v3
     with:
      node-version: "24"
   - name: Install pnpm
     uses: pnpm/action-setup@v2
     with:
      version: 7
   - name: Install dependencies
     run: cd Backend && pnpm install
   - name: Build Backend
     run: cd Backend && pnpm build

 build_frontend:
  name: Build Frontend
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Setup Node.js
     uses: actions/setup-node@v3
     with:
      node-version: "24"
   - name: Install pnpm
     uses: pnpm/action-setup@v2
     with:
      version: 7
   - name: Install dependencies
     run: cd UI && pnpm install
   - name: Build Frontend
     run: cd UI && CI=false && pnpm build

 generate_openapi_release:
  name: Generate OpenAPI Release
  needs: build_backend
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Setup Node.js
     uses: actions/setup-node@v3
     with:
      node-version: "24"
   - name: Install pnpm
     uses: pnpm/action-setup@v2
     with:
      version: 7
   - name: Install dependencies
     run: cd Backend && pnpm install
   - name: Copy environment file
     run: cp example.env Backend/.env
   - name: Start backend (background)
     run: |
      cd Backend
      set -a
      source .env
      set +a
      nohup pnpm dev >/tmp/backend.log 2>&1 &
      echo $! >/tmp/backend_dev.pid
   - name: Fetch OpenAPI spec
     run: |
      for i in {1..5}; do
       if curl -sf http://localhost:5000/api/openapi.json -o openapi.json; then
        exit 0
       fi
       sleep 2
      done
      echo "Backend did not become ready in time" >&2
      cat /tmp/backend.log || true
      exit 1
   - name: Stop backend
     if: always()
     run: |
      if [ -f /tmp/backend_dev.pid ]; then
       kill "$(cat /tmp/backend_dev.pid)" || true
      fi
   - name: Upload OpenAPI artifact
     uses: actions/upload-artifact@v4
     with:
      name: openapi-spec
      path: openapi.json
   - name: Publish release with OpenAPI artifact
     uses: softprops/action-gh-release@v1
     with:
      tag_name: openapi-${{ github.run_number }}
      name: OpenAPI ${{ github.run_number }}
      body: Generated OpenAPI spec from DEV workflow.
      files: openapi.json
     env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
