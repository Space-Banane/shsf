services:
 ui:
  image: node:24
  restart: always
  working_dir: /app
  env_file:
   - .env
  volumes:
   - ./UI:/app
  command: sh -c "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm tailwind:build && pnpm build && pnpm serve"
  ports:
   - "$UI_PORT:5000"
  environment:
   - TZ=Europe/Berlin
   - CI=false

 backend:
  image: node:24
  restart: always
  working_dir: /app
  volumes:
   - ./Backend:/app
   - /var/run/docker.sock:/var/run/docker.sock
   - /opt:/opt
   - ./.data:/.data
  command: sh -c "npm install -g pnpm && pnpm install --no-frozen-lockfile && npx prisma generate && npx prisma db push && pnpm dev"
  ports:
   - "$PORT:$PORT"
  env_file:
   - .env
  depends_on:
   - ui
  environment:
   - TZ=Europe/Berlin
   - CI=true

